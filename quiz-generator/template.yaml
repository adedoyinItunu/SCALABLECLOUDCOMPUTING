AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Quiz Generator - Scalable Cloud Programming CA

Parameters:
  AnthropicApiKey:
    Type: String
    NoEcho: true
    Description: "Anthropic API key injected at deploy time"

Globals:
  Function:
    Runtime: python3.9
    Timeout: 30
    Environment:
      Variables:
        TABLE_NAME: !Ref QuizTable
        QUEUE_URL: !Ref QuizQueue
        ANTHROPIC_API_KEY: !Sub "${AnthropicApiKey}"

Resources:

  QuizQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: quiz-jobs
      VisibilityTimeout: 60

  QuizTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: quiz-results
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: jobId
          AttributeType: S
      KeySchema:
        - AttributeName: jobId
          KeyType: HASH

  QuizApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: QuizApi
      StageName: Prod
      Cors:
        AllowMethods: "'GET,POST,OPTIONS'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
        AllowOrigin: "'*'"

  IngestFunction:
    Type: AWS::Serverless::Function
    Properties:
      Role: arn:aws:iam::730335605584:role/LabRole
      CodeUri: functions/ingest/
      Handler: app.lambda_handler
      Events:
        IngestApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref QuizApi
            Path: /quiz
            Method: post

  ProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      Role: arn:aws:iam::730335605584:role/LabRole
      CodeUri: functions/processor/
      Handler: app.lambda_handler
      Timeout: 60
      Events:
        SQSTrigger:
          Type: SQS
          Properties:
            Queue: !GetAtt QuizQueue.Arn
            BatchSize: 1

  GetQuizFunction:
    Type: AWS::Serverless::Function
    Properties:
      Role: arn:aws:iam::730335605584:role/LabRole
      CodeUri: functions/get_quiz/
      Handler: app.lambda_handler
      Events:
        GetQuizApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref QuizApi
            Path: /quiz/{jobId}
            Method: get

Outputs:
  ApiUrl:
    Description: "API Gateway URL - paste this into frontend/index.html"
    Value: !Sub "https://${QuizApi}.execute-api.${AWS::Region}.amazonaws.com/Prod"